syntax = "proto3";

package gamepademu;

option java_package = "com.zyz4.gamepademu.proto";
option java_multiple_files = true;
option csharp_namespace = "GamepadEmu.Protocol";

// ─── 枚举 ──────────────────────────────────────

enum ControllerMode {
  XBOX_360 = 0;
  DS4 = 1;
}

enum Button {
  A = 0; B = 1; X = 2; Y = 3;
  LB = 4; RB = 5;
  LT = 6; RT = 7;
  SELECT = 8; START = 9;
  L3 = 10; R3 = 11;
  DPAD_UP = 12; DPAD_DOWN = 13;
  DPAD_LEFT = 14; DPAD_RIGHT = 15;
  HOME = 16; TOUCHPAD_CLICK = 17;
}

// ─── 手机 → PC ─────────────────────────────────

message ClientToServer {
  oneof payload {
    Hello hello = 1;
    GamepadInput gamepad_input = 2;
    KeepAlive keep_alive = 3;
    GyroCalibration gyro_calibration = 4;
  }
}

message Hello {
  uint32 protocol_version = 1;
  string device_name = 2;
  ControllerMode controller_mode = 3;
  uint32 controller_index = 4;
}

message GamepadInput {
  uint32 buttons = 1;
  sint32 left_stick_x = 2;
  sint32 left_stick_y = 3;
  sint32 right_stick_x = 4;
  sint32 right_stick_y = 5;
  uint32 left_trigger = 6;
  uint32 right_trigger = 7;
  uint32 dpad = 8;
  float gyro_x = 9;
  float gyro_y = 10;
  float gyro_z = 11;
  float accel_x = 12;
  float accel_y = 13;
  float accel_z = 14;
  uint32 touchpad_x = 15;
  uint32 touchpad_y = 16;
  bool touchpad_touch = 17;
  bool touchpad_click = 18;
  uint32 battery_level = 19;
}

message KeepAlive {
  uint64 timestamp = 1;
}

message GyroCalibration {
  float bias_x = 1;
  float bias_y = 2;
  float bias_z = 3;
}

// ─── PC → 手机 ─────────────────────────────────

message ServerToClient {
  oneof payload {
    Vibration vibration = 1;
    Ack ack = 2;
    Disconnect disconnect = 3;
    SetControllerMode set_controller_mode = 4;
    StartGyroCalibration start_gyro_calibration = 5;
  }
}

message Vibration {
  uint32 large_motor = 1;
  uint32 small_motor = 2;
}

message Ack {
  bool success = 1;
  string message = 2;
}

message Disconnect {
  string reason = 1;
}

message SetControllerMode {
  ControllerMode mode = 1;
}

message StartGyroCalibration {
  uint32 duration_ms = 1;
}
